---

- name: readiness/clean_tmp | Delete .clusterverse_vol* files on cluster hosts
  block:
    - name: readiness/clean_tmp | Find all .clusterverse_vol* files on cluster hosts
      become: true
      ansible.builtin.find:
        paths: "{{ item.1 }}/"
        patterns: '.clusterverse_vol*'
        hidden: true
      delegate_to: "{{ item.0.hostname }}"
      with_subelements:
        - "{{ autovols }}"
        - nonroot_volumes
      vars:
        autovols: "{{ cluster_hosts_target | json_query(\"[?auto_volumes].{hostname: hostname, nonroot_volumes: auto_volumes[?mountpoint != `/`].mountpoint}\") }}"
      when: item.0.hostname in groups['all']
      register: r__find_clusterverse_vol_files

#    - name: readiness/clean_tmp | Debug found files
#      debug: msg="{{ r__find_clusterverse_vol_files }}"

    - block:
        - name: readiness/clean_tmp | Debug found files (denormalised)
          debug:
            msg: ["{{item.0.item.0.hostname}}", "{{item.1.path}}"]
          loop: "{{ r__find_clusterverse_vol_files.results | selectattr('skipped', 'undefined') | subelements('files') }}"
          loop_control: { label: "{{item.0.item.0}}" }

        - name: readiness/clean_tmp | Delete found files on cluster hosts
          become: true
          ansible.builtin.file:
            path: "{{ item.1.path }}"
            state: absent
          delegate_to: "{{ item.0.item.0.hostname }}"
          loop: "{{ r__find_clusterverse_vol_files.results | selectattr('skipped', 'undefined') | subelements('files') }}"
          loop_control: { label: "{{item.1.path}}" }


- name: readiness/clean_tmp | Delete id_rsa keys on localhost
  delegate_to: localhost
  run_once: true
  block:
    - name: readiness/clean_tmp | find all id_rsa keys
      ansible.builtin.find:
        paths: "{{ playbook_dir }}"
        patterns: 'id_rsa__cv_*'
      register: r__find_id_rsa_keys

    - name: readiness/clean_tmp | Debug found id_rsa files
      debug: msg="{{ r__find_id_rsa_keys | json_query(\"files[*].path\") }}"

    - name: readiness/clean_tmp | Delete found keys on localhost
      ansible.builtin.file:
        path: "{{ item.path }}"
        state: absent
      loop: "{{ r__find_id_rsa_keys.files }}"
      loop_control: { label: "{{item.path}}" }
