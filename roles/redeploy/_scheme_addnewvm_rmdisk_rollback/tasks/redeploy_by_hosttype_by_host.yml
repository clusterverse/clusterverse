---

- name: "_scheme_addnewvm_rmdisk_rollback/by_hosttype_by_host | Run {{deployplaybook}} to add {{cluster_host_redeploying.hostname}} to cluster.  Note: If an argv tuple value starts with '{', or contains '={', surround it with single quotes to preserve as dict when re-parsed"
  dseeley.nested_playbook.nested_playbook:
    playbook_cmdline: "{{ (ansible_facts.argv[1:] | map('regex_replace', '(^|=)(\\{.*\\})$', \"\\1'\\2'\" ) | join(' ')) | regex_replace('redeploy.yml', deployplaybook) }} -e cluster_suffix={{cluster_suffix}} -e '{'cluster_hosts_target': [{{cluster_host_redeploying | to_json}}]}'  {{ redeploy_extra_vars | default({}) | clusterverse.clusterverse.extravars_from_dict }} --skip-tags=readiness_clean"

- fail:
  when: testfail is defined and testfail == "fail_1"

- name: _scheme_addnewvm_rmdisk_rollback/by_hosttype_by_host | re-acquire cluster_hosts_state
  include_role:
    name: "clusterverse.clusterverse.cluster_hosts"
    tasks_from: "get_cluster_hosts_state.yml"

- name: _scheme_addnewvm_rmdisk_rollback/by_hosttype_by_host | stop/ remove previous instance
  block:
    - name: _scheme_addnewvm_rmdisk_rollback/by_hosttype_by_host | debug hosts_to_remove
      debug: msg="{{hosts_to_remove}}"

    - name: _scheme_addnewvm_rmdisk_rollback/by_hosttype_by_host | run predeleterole role
      include_role:
        name: "{{predeleterole}}"
      when: predeleterole is defined and predeleterole != ""

    - name: _scheme_addnewvm_rmdisk_rollback/by_hosttype_by_host | Power off old VMs
      include_role:
        name: clusterverse.clusterverse.redeploy.__common
        tasks_from: "powerchange_vms_{{cluster_vars.cloud_type}}.yml"
      vars:
        hosts_to_powerchange: "{{ hosts_to_remove }}"
        powerchange_new_state: "stop"

    - fail:
      when: testfail is defined and testfail == "fail_2"
  vars:
    _root_cluster_host_redeploying: "{{cluster_host_redeploying.hostname | regex_replace('-(?!.*-).*')}}"
    hosts_to_remove: "{{ cluster_hosts_state | to_json | from_json | json_query(\"[?tagslabels.cv__lifecycle_state=='retiring' && starts_with(name, '\" + _root_cluster_host_redeploying + \"')]\") }}"
