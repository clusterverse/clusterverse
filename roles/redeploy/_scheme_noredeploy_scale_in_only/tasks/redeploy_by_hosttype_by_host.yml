---

- name: _scheme_noredeploy_scale_in_only/by_hosttype_by_host | debug host_to_del
  debug: msg="{{host_to_del}}"

- name: _scheme_noredeploy_scale_in_only/by_hosttype_by_host | Change cv__lifecycle_state label from 'current' to 'retiring'
  include_role:
    name: clusterverse.clusterverse.redeploy.__common
    tasks_from: "set_lifecycle_state_label_{{cluster_vars.cloud_type}}.yml"
  vars:
    hosts_to_relabel: "{{ [host_to_del] }}"
    new_state: "retiring"

- name: _scheme_noredeploy_scale_in_only/by_hosttype_by_host | run predeleterole role
  include_role:
    name: "{{predeleterole}}"
  vars:
    hosts_to_remove: "{{ [host_to_del] }}"
  when: predeleterole is defined and predeleterole != ""

- name: _scheme_noredeploy_scale_in_only/by_hosttype_by_host | Power off old VM
  include_role:
    name: clusterverse.clusterverse.redeploy.__common
    tasks_from: "powerchange_vms_{{cluster_vars.cloud_type}}.yml"
  vars:
    hosts_to_powerchange: "{{ [host_to_del] }}"
    powerchange_new_state: "stop"

- name: "_scheme_noredeploy_scale_in_only/by_hosttype_by_host | Run {{deployplaybook}} to fix cluster.  Note: If an argv tuple value starts with '{', or contains '={', surround it with single quotes to preserve as dict when re-parsed"
  dseeley.nested_playbook.nested_playbook:
    playbook_cmdline: "{{ (ansible_facts.argv[1:] | map('regex_replace', '(^|=)(\\{.*\\})$', \"\\1'\\2'\" ) | join(' ')) | regex_replace('redeploy.yml', deployplaybook) }} {{ redeploy_extra_vars | default({}) | clusterverse.clusterverse.extravars_from_dict }} --skip-tags=readiness_clean"

- name: _scheme_noredeploy_scale_in_only/by_hosttype_by_host | re-acquire the dynamic inventory (includes cluster_hosts_state)
  include_role:
    name: clusterverse.clusterverse.dynamic_inventory
